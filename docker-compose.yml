services:
  postgres:
    image: postgres:16-alpine
    container_name: salonpro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salonpro
    ports:
      - "5432:5432"
    volumes:
      - salonpro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d salonpro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  salonpro-postgres-data:
